name: Build & Test Debug

on:
  push:
    branches: [ master, staging, stable ]
  merge_group:
  pull_request:
    types: [ opened, reopened, synchronize, ready_for_review ]
    branches: [ master, staging, stable ]

jobs:
  build:
    if: github.actor != 'PJBot' && github.event.pull_request.draft == false
    strategy:
      matrix:
        os: [ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout Master
      uses: actions/checkout@v4.2.2

    - name: Setup Submodule
      run: |
        git submodule update --init --recursive

    - name: Pull engine updates
      uses: space-wizards/submodule-dependency@v0.1.5

    - name: Update Engine Submodules
      run: |
        cd RobustToolbox/
        git submodule update --init --recursive

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v4.1.0
      with:
        dotnet-version: 9.0.x

    - name: Install dependencies
      run: dotnet restore

    - name: Build Project
      run: dotnet build --configuration DebugOpt --no-restore /m

    - name: Run Content.Tests
      run: dotnet test --no-build --configuration DebugOpt Content.Tests/Content.Tests.csproj -- NUnit.ConsoleOut=0

    - name: Check available resources
      run: |
        echo "=== System Resources ==="
        echo "CPU cores: $(nproc)"
        echo "Memory:"
        free -h
        echo "Disk space:"
        df -h
        echo "========================"

    - name: Run Content.IntegrationTests
      timeout-minutes: 60
      shell: pwsh
      run: |
        $env:DOTNET_gcServer=1

        # Start resource monitoring in background
        $monitorScript = {
          param($logFile)
          while ($true) {
            $timestamp = Get-Date -Format 'o'
            $mem = free -m 2>$null | Out-String
            $cpu = top -bn1 2>$null | head -n 5 | Out-String
            "$timestamp`n$mem`n$cpu`n---" | Out-File -Append -FilePath $logFile
            Start-Sleep -Seconds 30
          }
        }

        $logFile = "/tmp/resource_monitor.log"
        $monitorJob = Start-Job -ScriptBlock $monitorScript -ArgumentList $logFile

        try {
          dotnet test --no-build --configuration DebugOpt Content.IntegrationTests/Content.IntegrationTests.csproj `
            -- NUnit.MapWarningTo=Failed NUnit.NumberOfTestWorkers=2
        } finally {
          # Stop monitoring
          Stop-Job $monitorJob -ErrorAction SilentlyContinue
          Remove-Job $monitorJob -ErrorAction SilentlyContinue

          # Output last part of monitor log
          if (Test-Path $logFile) {
            Write-Host "=== Resource Monitor Log (last 50 lines) ==="
            Get-Content $logFile | Select-Object -Last 50
            Write-Host "============================================"
          }
        }
  ci-success:
    name: Build & Test Debug
    needs:
      - build
    runs-on: ubuntu-latest
    steps:
      - name: CI succeeded
        run: exit 0
