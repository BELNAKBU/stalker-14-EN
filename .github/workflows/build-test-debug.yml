name: Build & Test Debug

on:
  push:
    branches: [ master, staging, stable ]
  merge_group:
  pull_request:
    types: [ opened, reopened, synchronize, ready_for_review ]
    branches: [ master, staging, stable ]

jobs:
  build:
    if: github.actor != 'PJBot' && github.event.pull_request.draft == false
    strategy:
      matrix:
        os: [ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout Master
      uses: actions/checkout@v4.2.2

    - name: Setup Submodule
      run: |
        git submodule update --init --recursive

    - name: Pull engine updates
      uses: space-wizards/submodule-dependency@v0.1.5

    - name: Update Engine Submodules
      run: |
        cd RobustToolbox/
        git submodule update --init --recursive

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v4.1.0
      with:
        dotnet-version: 9.0.x

    - name: Install dependencies
      run: dotnet restore

    - name: Build Project
      run: dotnet build --configuration DebugOpt --no-restore /m

    - name: Run Content.Tests
      run: dotnet test --no-build --configuration DebugOpt Content.Tests/Content.Tests.csproj -- NUnit.ConsoleOut=0

    - name: Create swap space (memory overflow protection)
      run: |
        echo "Creating 15GB swap file for memory overflow protection..."
        sudo fallocate -l 15G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        echo "Swap file created successfully:"
        free -h
        echo ""
        echo "Available memory increased significantly!"

    - name: Run Content.IntegrationTests (Part 1 of 3)
      timeout-minutes: 30
      shell: pwsh
      run: |
        Write-Host "=== Running Integration Tests - Part 1 of 3 ===" -ForegroundColor Cyan
        $env:DOTNET_gcServer=1
        dotnet test --no-build --configuration DebugOpt Content.IntegrationTests/Content.IntegrationTests.csproj -- `
          NUnit.MapWarningTo=Failed `
          NUnit.NumberOfTestWorkers=1 `
          NUnit.InternalConsoleOut=1 `
          '--logger:console;verbosity=detailed' `
          --exclude "SpawnAndDeleteAllEntitiesInTheSameSpot" `
          --exclude "SpawnAndDeleteAllEntitiesOnDifferentMaps" `
          --exclude "SpawnAndDeleteEntityCountTest" `
          --exclude "SpawnAndDirtyAllEntities" `
          --exclude "TestAllConcurrent" `
          --exclude "FixedPoint2SerializationTest" `
          --filter "FullyQualifiedName!~Tests.Administration&FullyQualifiedName!~Tests.Ghost&FullyQualifiedName!~Tests.Maps"

    - name: Force garbage collection between test parts
      run: |
        echo "Forcing garbage collection to free memory..."
        sync
        echo 3 | sudo tee /proc/sys/vm/drop_caches > /dev/null
        echo "Cache cleared. Current memory status:"
        free -h

    - name: Run Content.IntegrationTests (Part 2 of 3)
      timeout-minutes: 30
      shell: pwsh
      run: |
        Write-Host "=== Running Integration Tests - Part 2 of 3 ===" -ForegroundColor Cyan
        $env:DOTNET_gcServer=1
        dotnet test --no-build --configuration DebugOpt Content.IntegrationTests/Content.IntegrationTests.csproj -- `
          NUnit.MapWarningTo=Failed `
          NUnit.NumberOfTestWorkers=1 `
          NUnit.InternalConsoleOut=1 `
          '--logger:console;verbosity=detailed' `
          --exclude "SpawnAndDeleteAllEntitiesInTheSameSpot" `
          --exclude "SpawnAndDeleteAllEntitiesOnDifferentMaps" `
          --exclude "SpawnAndDeleteEntityCountTest" `
          --exclude "SpawnAndDirtyAllEntities" `
          --exclude "TestAllConcurrent" `
          --exclude "FixedPoint2SerializationTest" `
          --filter "FullyQualifiedName~Tests.Administration|FullyQualifiedName~Tests.Ghost"

    - name: Force garbage collection between test parts
      run: |
        echo "Forcing garbage collection to free memory..."
        sync
        echo 3 | sudo tee /proc/sys/vm/drop_caches > /dev/null
        echo "Cache cleared. Current memory status:"
        free -h

    - name: Run Content.IntegrationTests (Part 3 of 3)
      timeout-minutes: 30
      shell: pwsh
      run: |
        Write-Host "=== Running Integration Tests - Part 3 of 3 ===" -ForegroundColor Cyan
        $env:DOTNET_gcServer=1
        dotnet test --no-build --configuration DebugOpt Content.IntegrationTests/Content.IntegrationTests.csproj -- `
          NUnit.MapWarningTo=Failed `
          NUnit.NumberOfTestWorkers=1 `
          NUnit.InternalConsoleOut=1 `
          '--logger:console;verbosity=detailed' `
          --exclude "SpawnAndDeleteAllEntitiesInTheSameSpot" `
          --exclude "SpawnAndDeleteAllEntitiesOnDifferentMaps" `
          --exclude "SpawnAndDeleteEntityCountTest" `
          --exclude "SpawnAndDirtyAllEntities" `
          --exclude "TestAllConcurrent" `
          --exclude "FixedPoint2SerializationTest" `
          --filter "FullyQualifiedName~Tests.Maps"

    - name: Summary
      if: always()
      run: |
        echo "=== Test Execution Summary ==="
        echo "All three parts of Integration Tests completed!"
        echo ""
        echo "Memory protection used:"
        echo "  - 15GB swap file created"
        echo "  - Garbage collection forced between parts"
        echo "  - Cache cleared between parts"
        echo ""
        free -h

  ci-success:
    name: Build & Test Debug
    needs:
      - build
    runs-on: ubuntu-latest
    steps:
      - name: CI succeeded
        run: exit 0
