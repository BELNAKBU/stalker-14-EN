name: Build & Test Debug

on:
  push:
    branches: [ master, staging, stable ]
  merge_group:
  pull_request:
    types: [ opened, reopened, synchronize, ready_for_review ]
    branches: [ master, staging, stable ]

jobs:
  build:
    if: github.actor != 'PJBot' && github.event.pull_request.draft == false
    strategy:
      matrix:
        os: [ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout Master
      uses: actions/checkout@v4.2.2

    - name: Setup Submodule
      run: |
        git submodule update --init --recursive

    - name: Pull engine updates
      uses: space-wizards/submodule-dependency@v0.1.5

    - name: Update Engine Submodules
      run: |
        cd RobustToolbox/
        git submodule update --init --recursive

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v4.1.0
      with:
        dotnet-version: 9.0.x

    - name: Install dependencies
      run: dotnet restore

    - name: Build Project
      run: dotnet build --configuration DebugOpt --no-restore /m

    - name: Run Content.Tests
      run: dotnet test --no-build --configuration DebugOpt Content.Tests/Content.Tests.csproj -- NUnit.ConsoleOut=0

    - name: Check available resources
      run: |
        echo "=== System Resources ==="
        echo "CPU cores: $(nproc)"
        echo "Memory:"
        free -h
        echo "Disk space:"
        df -h
        echo "========================"

    - name: List Integration Tests
      run: |
        echo "=== Available Integration Tests ==="
        dotnet test --no-build --list-tests Content.IntegrationTests/Content.IntegrationTests.csproj 2>&1 | head -n 50
        echo "===================================="

    - name: Run Content.IntegrationTests
      timeout-minutes: 90
      run: |
        set -e
        set -x

        echo "=== Starting Integration Tests ==="
        echo "Time: $(date)"
        echo "PID: $$"

        # Start resource monitoring in background
        (
          while true; do
            echo "=== $(date -Iseconds) ==="
            echo "Memory:"
            free -h
            echo "Top processes:"
            ps aux --sort=-%mem | head -n 6
            echo ""
            sleep 30
          done
        ) > /tmp/resource_monitor.log 2>&1 &
        MONITOR_PID=$!

        echo "Monitor PID: $MONITOR_PID"

        # Cleanup handler - guarantees cleanup on exit/error/timeout
        cleanup() {
          echo ""
          echo "=== Cleanup triggered ==="
          echo "Killing monitor process: $MONITOR_PID"
          kill $MONITOR_PID 2>/dev/null || true

          # Kill all dotnet processes to prevent zombies
          echo "Killing all dotnet processes..."
          pkill -9 -f "dotnet.*Content.IntegrationTests" 2>/dev/null || true

          # Output monitor log
          echo ""
          echo "=== Resource Monitor Log ==="
          cat /tmp/resource_monitor.log 2>/dev/null || echo "No monitor log available"
          echo "==========================="

          echo "Cleanup completed"
        }
        trap cleanup EXIT INT TERM

        # Run tests with detailed logging
        echo "=== Running dotnet test ==="
        export DOTNET_gcServer=1
        dotnet test --no-build --configuration DebugOpt Content.IntegrationTests/Content.IntegrationTests.csproj \
          -- NUnit.MapWarningTo=Failed \
             NUnit.NumberOfTestWorkers=2 \
             NUnit.DefaultTimeout=300000 \
             --logger "console;verbosity=normal"

        TEST_EXIT_CODE=$?
        echo "Tests completed with exit code: $TEST_EXIT_CODE"

        # Exit with test exit code (trap will run cleanup automatically)
        exit $TEST_EXIT_CODE

    - name: Check for zombie processes
      if: always()
      run: |
        echo "=== Checking for zombie processes ==="
        ps aux | grep -E "dotnet|Content.Integration" | grep -v grep || echo "No zombies found"
        echo "=== Disk usage ==="
        df -h

  ci-success:
    name: Build & Test Debug
    needs:
      - build
    runs-on: ubuntu-latest
    steps:
      - name: CI succeeded
        run: exit 0
